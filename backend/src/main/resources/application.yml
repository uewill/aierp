server:
  port: 8090

spring:
  application:
    name: aierp-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aierp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aierp.common.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: aierp-secret-key-2026-very-long-secret-key-for-jwt-token-security
  expiration: 86400000 # 24小时

# AI配置（后续对接AI服务）
ai:
  enabled: false  # 设为 true 并配置 zhipu-api-key 启用 GLM-4
  zhipu-api-key: ""  # 智谱 API Key
  zhipu-api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  model: glm-4-flash  # 模型：glm-4 / glm-4-flash / glm-4-plus

# Knife4j API文档
knife4j:
  enable: true
  openapi:
    title: aierp API文档
    description: AI驱动进销存系统API
    version: 1.0.0
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.aierp